<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horários - Prisma</title>

<style>

:root {
    --azul: #0097b2;
    --azul-escuro: #004651;
    --amarelo: #ffde59;
    --texto: #333;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background-image: url("assets/fundo.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    min-height: 100vh;
    padding: 30px;
    color: var(--texto);
}

.container {
    max-width: 1200px;
    margin: auto;
}

.topo {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

.topo h1 {
    color: var(--azul);
    font-size: 2.3rem;
}

.btn-voltar {
    background: white;
    color: var(--azul);
    border: none;
    padding: 10px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.painel {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 25px;
    margin-bottom: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.painel h2 {
    color: var(--azul);
    margin-bottom: 15px;
}

input, select {
    width: 100%;
    padding: 13px;
    margin-bottom: 12px;
    border-radius: 12px;
    border: 1px solid #ccc;
    outline: none;
    font-size: 1rem;
}

.btn-add {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: var(--azul);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.btn-add:hover {
    background: #00748a;
}

.grade-wrapper {
    overflow-x: auto;
}

.grade-table {
    width: 100%;
    border-collapse: collapse;
    border-radius: 15px;
    overflow: hidden;
    background: rgba(255,255,255,0.9);
}

.grade-table th {
    background: #0097b2;
    color: white;
    padding: 14px;
}

.grade-table td {
    border: 1px solid #ddd;
    padding: 12px;
    text-align: center;
    vertical-align: top;
    min-width: 140px;
}

.aula-numero {
    background: #f4f4f4;
    font-weight: bold;
}

.materia-box {
    background: rgba(255,255,255,0.95);
    border-left: 4px solid #ffde59;
    border-radius: 10px;
    padding: 8px;
    margin-bottom: 6px;
    font-size: 0.9rem;
}

.btn-remover-mini {
    margin-top: 6px;
    background: #ff5c5c;
    color: white;
    border: none;
    padding: 4px 8px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.75rem;
}

.vazio {
    color: #555;
    padding: 12px;
}

@media(max-width:900px) {

    body {
        padding: 15px;
    }

    .topo {
        flex-direction: column;
        gap: 15px;
        text-align: center;
    }

    .grade-table {
        font-size: 0.8rem;
    }

    .grade-table td {
        min-width: 100px;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="topo">

        <h1>🏫 Horários da Escola</h1>

        <button
            class="btn-voltar"
            onclick="window.location.href='index.html'"
        >
            Voltar
        </button>

    </div>

    <div class="painel">

        <h2>Adicionar aula</h2>

        <select id="periodo">
            <option value="Meio período">Meio período</option>
            <option value="Integral">Integral</option>
        </select>

        <select id="dia">
            <option value="Segunda-feira">Segunda-feira</option>
            <option value="Terça-feira">Terça-feira</option>
            <option value="Quarta-feira">Quarta-feira</option>
            <option value="Quinta-feira">Quinta-feira</option>
            <option value="Sexta-feira">Sexta-feira</option>
        </select>

        <select id="aula"></select>

        <input
            type="text"
            id="materia"
            placeholder="Matéria"
        >

        <input
            type="time"
            id="inicio"
        >

        <input
            type="time"
            id="fim"
        >

        <button onclick="adicionarHorario()" class="btn-add">
            Adicionar horário
        </button>

    </div>

    <div class="painel">

        <h2>Minha grade escolar</h2>

        <div class="grade-wrapper">

            <table class="grade-table">

                <thead>

                    <tr>
                        <th>Aula</th>
                        <th>Segunda</th>
                        <th>Terça</th>
                        <th>Quarta</th>
                        <th>Quinta</th>
                        <th>Sexta</th>
                    </tr>

                </thead>

                <tbody id="lista"></tbody>

            </table>

        </div>

    </div>

</div>

<script>

const selectPeriodo = document.getElementById("periodo");
const selectAula = document.getElementById("aula");

function atualizarAulas() {

    const periodo = selectPeriodo.value;

    selectAula.innerHTML = "";

    const totalAulas = periodo === "Integral" ? 9 : 5;

    for (let i = 1; i <= totalAulas; i++) {

        const option = document.createElement("option");

        option.value = `${i}ª aula`;
        option.innerText = `${i}ª aula`;

        selectAula.appendChild(option);

    }

}

selectPeriodo.addEventListener("change", () => {
    atualizarAulas();
    carregarHorarios();
});

atualizarAulas();

function carregarHorarios() {

    const horarios =
        JSON.parse(localStorage.getItem("horariosPrisma")) || [];

    const lista =
        document.getElementById("lista");

    lista.innerHTML = "";

    const periodoSelecionado =
        document.getElementById("periodo").value;

    const totalAulas =
        periodoSelecionado === "Integral" ? 9 : 5;

    const dias = [
        "Segunda-feira",
        "Terça-feira",
        "Quarta-feira",
        "Quinta-feira",
        "Sexta-feira"
    ];

    for (let aula = 1; aula <= totalAulas; aula++) {

        const tr = document.createElement("tr");

        tr.innerHTML =
            `<td class="aula-numero">${aula}ª aula</td>`;

        dias.forEach((dia) => {

            const td = document.createElement("td");

            const aulasFiltradas = horarios
                .map((item, index) => ({ ...item, index }))
                .filter((item) =>
                    item.dia === dia &&
                    item.aula === `${aula}ª aula` &&
                    item.periodo === periodoSelecionado
                );

            aulasFiltradas.forEach((item) => {

                const div = document.createElement("div");

                div.className = "materia-box";

                div.innerHTML = `
                    <strong>${item.materia}</strong><br>
                    ⏰ ${item.inicio} - ${item.fim}<br>
                    🏫 ${item.periodo}<br>

                    <button
                        class="btn-remover-mini"
                        onclick="removerHorario(${item.index})"
                    >
                        Remover
                    </button>
                `;

                td.appendChild(div);

            });

            tr.appendChild(td);

        });

        lista.appendChild(tr);

    }

    const horariosFiltrados =
        horarios.filter(item => item.periodo === periodoSelecionado);

    if (horariosFiltrados.length === 0) {

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td colspan="6" class="vazio">
                Nenhum horário cadastrado para ${periodoSelecionado}.
            </td>
        `;

        lista.appendChild(tr);

    }

}

function adicionarHorario() {

    const periodo = document.getElementById("periodo").value;
    const dia = document.getElementById("dia").value;
    const aula = document.getElementById("aula").value;
    const materia = document.getElementById("materia").value.trim();
    const inicio = document.getElementById("inicio").value;
    const fim = document.getElementById("fim").value;

    if (!materia || !inicio || !fim) {

        alert("Preencha todos os campos.");

        return;

    }

    const horarios =
        JSON.parse(localStorage.getItem("horariosPrisma")) || [];

    horarios.push({
        periodo,
        dia,
        aula,
        materia,
        inicio,
        fim
    });

    localStorage.setItem(
        "horariosPrisma",
        JSON.stringify(horarios)
    );

    document.getElementById("materia").value = "";
    document.getElementById("inicio").value = "";
    document.getElementById("fim").value = "";

    carregarHorarios();

}

function removerHorario(index) {

    const horarios =
        JSON.parse(localStorage.getItem("horariosPrisma")) || [];

    horarios.splice(index, 1);

    localStorage.setItem(
        "horariosPrisma",
        JSON.stringify(horarios)
    );

    carregarHorarios();

}

carregarHorarios();

</script>

</body>
</html>

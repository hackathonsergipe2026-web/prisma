<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fórum Prisma</title>

<style>

:root {
    --azul: #0097b2;
    --azul-escuro: #004651;
    --amarelo: #ffde59;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background-image: url("assets/fundo.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    min-height: 100vh;
    padding: 30px;
}

.container {
    max-width: 900px;
    margin: auto;
}

.topo {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

.topo h1 {
    color: #0097b2;
    font-size: 2.3rem;
}

.btn-voltar {
    background: white;
    color: var(--azul);
    border: none;
    padding: 10px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.painel {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 25px;
    margin-bottom: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

textarea {
    width: 100%;
    min-height: 120px;
    padding: 15px;
    border-radius: 15px;
    border: 1px solid #ccc;
    resize: none;
    outline: none;
    font-size: 1rem;
    margin-bottom: 15px;
}

.btn-postar {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #0097b2;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.btn-postar:hover {
    background: #00748a;
}

.post {
    background: white;
    border-left: 5px solid var(--amarelo);
    border-radius: 15px;
    padding: 15px;
    margin-bottom: 15px;
}

.post strong {
    color: #0097b2;
}

.post small {
    color: #777;
}

.vazio {
    color: #555;
    text-align: center;
    padding: 20px;
}

</style>
</head>

<body>

<div class="container">

    <div class="topo">

        <h1>📚 Fórum Prisma</h1>

        <button
            class="btn-voltar"
            onclick="window.location.href='index.html'"
        >
            Voltar
        </button>

    </div>

    <!-- NOVA MENSAGEM -->

    <div class="painel">

        <textarea
            id="mensagem"
            placeholder="Digite sua dúvida ou mensagem..."
        ></textarea>

        <button onclick="publicarMensagem()" class="btn-postar">
            Publicar
        </button>

    </div>

    <!-- POSTS -->

    <div class="painel">

        <div id="posts"></div>

    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
    getAuth
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

import {
    getFirestore,
    collection,
    addDoc,
    query,
    orderBy,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {

    apiKey: "AIzaSyAc7jzDVNaMpvvUEcLvWLKn3tlwXbIjPfE",

    authDomain: "prisma-77a34.firebaseapp.com",

    databaseURL: "https://prisma-77a34-default-rtdb.firebaseio.com",

    projectId: "prisma-77a34",

    storageBucket: "prisma-77a34.firebasestorage.app",

    messagingSenderId: "1051365316351",

    appId: "1:1051365316351:web:8ff75e9afefb8c66b29eca",

    measurementId: "G-98JH6J2WHD"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const postsDiv =
    document.getElementById("posts");

async function publicarMensagem() {

    const mensagem =
        document.getElementById("mensagem").value.trim();

    const user =
        auth.currentUser;

    if (!mensagem) {

        alert("Digite uma mensagem.");

        return;

    }

    if (!user) {

        alert("Você precisa estar logado.");

        return;

    }

    await addDoc(collection(db, "forumPosts"), {

        mensagem: mensagem,

        autor: user.email,

        data: new Date().toISOString()

    });

    document.getElementById("mensagem").value = "";

}

window.publicarMensagem =
    publicarMensagem;

const q =
    query(
        collection(db, "forumPosts"),
        orderBy("data", "desc")
    );

onSnapshot(q, (snapshot) => {

    postsDiv.innerHTML = "";

    if (snapshot.empty) {

        postsDiv.innerHTML =
            `<p class="vazio">
                Nenhuma mensagem ainda.
            </p>`;

        return;

    }

    snapshot.forEach((doc) => {

        const post =
            doc.data();

        const div =
            document.createElement("div");

        div.className = "post";

        div.innerHTML = `
            <strong>${post.autor}</strong><br><br>

            ${post.mensagem}<br><br>

            <small>
                ${new Date(post.data).toLocaleString()}
            </small>
        `;

        postsDiv.appendChild(div);

    });

});

</script>

</body>
</html>
